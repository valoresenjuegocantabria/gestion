<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORES EN JUEGOS - Gastos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .concepto-tag { font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 4px 10px; border-radius: 8px; display: inline-block; }
        .card-dash { background: white; border: 1px solid #f1f5f9; padding: 1.5rem; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .th-sort { cursor: pointer; transition: all 0.2s; user-select: none; }
        .th-sort:hover { background-color: #f1f5f9; }
        canvas { max-height: 300px !important; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-white border-b border-slate-100 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center">
                    <span class="text-white font-black text-xl">A</span>
                </div>
                <h1 class="text-sm font-black uppercase tracking-tighter">Asoc<span class="text-slate-400">Manager</span></h1>
            </div>
            <div class="flex gap-6 items-center">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-colors">Socios</a>
                <a href="pagos.html" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-colors">Pagos</a>
                <a href="gastos.html" class="text-[10px] font-black uppercase tracking-widest text-slate-900 border-b-2 border-slate-900 pb-1">Gastos</a>
                <a href="balance.html" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-colors">Balance</a>
                <button onclick="abrirModalGasto()" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-all shadow-lg">
                    + Nuevo Gasto
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 card-dash">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Evolución Gastos Mensuales</h3>
                <canvas id="chartGastos"></canvas>
            </div>
            <div class="space-y-4" id="dashboard-mini"></div>
        </div>

        <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col md:flex-row gap-4 items-center">
            <input type="text" id="buscar-text" oninput="renderizarTodo()" placeholder="Buscar por concepto u observación..." class="flex-1 w-full pl-4 py-3 bg-slate-50 rounded-2xl outline-none text-sm">
            
            <select id="filtro-mes" onchange="renderizarTodo()" class="w-full md:w-48 p-3 bg-slate-50 rounded-2xl outline-none text-xs font-bold uppercase">
                <option value="TODOS">Todos los meses</option>
            </select>

            <select id="filtro-categoria" onchange="renderizarTodo()" class="w-full md:w-48 p-3 bg-slate-50 rounded-2xl outline-none text-xs font-bold uppercase">
                <option value="TODAS">Todas las categorías</option>
                <option value="ALQUILER">ALQUILER</option><option value="LUZ">LUZ</option><option value="AGUA">AGUA</option><option value="AGENCIA">AGENCIA</option><option value="MATERIAL">MATERIAL</option><option value="OTROS">OTROS</option>
            </select>
        </div>

        <div class="bg-white rounded-3xl border border-slate-100 shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-[10px] uppercase font-black text-slate-400 border-b">
                            <th onclick="ejecutarOrden('mes')" class="th-sort px-6 py-4">Mes <span id="icon-mes">↕</span></th>
                            <th class="px-6 py-4">Concepto</th>
                            <th class="px-6 py-4">Observaciones</th>
                            <th onclick="ejecutarOrden('importe')" class="th-sort px-6 py-4">Importe <span id="icon-importe">↕</span></th>
                            <th class="px-6 py-4 w-32 text-center">Estado</th>
                            <th class="px-6 py-4 w-24 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-gastos-body" class="divide-y divide-slate-50 text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalGasto" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden p-8">
            <form id="formGasto" class="space-y-4">
                <input type="hidden" id="g-id"> <h2 id="modal-titulo" class="font-black uppercase text-xs">Registrar Nuevo Gasto</h2>
                <div class="grid grid-cols-2 gap-4">
                    <select id="g-mes" class="w-full p-3 bg-slate-50 rounded-xl font-bold text-sm"></select>
                    <input type="text" id="g-factura" placeholder="Factura" class="w-full p-3 bg-slate-50 rounded-xl text-sm">
                </div>
                <select id="g-concepto" required class="w-full p-3 bg-slate-50 rounded-xl font-bold text-sm">
                    <option value="ALQUILER">ALQUILER</option><option value="LUZ">LUZ</option><option value="AGUA">AGUA</option><option value="AGENCIA">AGENCIA</option><option value="MATERIAL">MATERIAL</option><option value="OTROS">OTROS</option>
                </select>
                <input type="text" id="g-obs" placeholder="Observaciones..." class="w-full p-3 bg-slate-50 rounded-xl text-sm outline-none border border-transparent focus:border-slate-200">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" step="0.01" id="g-importe" required placeholder="0.00" class="w-full p-3 bg-slate-50 rounded-xl font-black text-rose-600">
                    <select id="g-estado" class="w-full p-3 bg-slate-50 rounded-xl font-bold text-sm">
                        <option value="Pagado">PAGADO</option>
                        <option value="No Pagado">PENDIENTE</option>
                    </select>
                </div>
                <button type="submit" id="btn-guardar" class="w-full py-4 bg-slate-900 text-white font-black rounded-2xl uppercase text-[10px] hover:bg-slate-800 transition-colors">Guardar Gasto</button>
                <button type="button" onclick="cerrarModalGasto()" class="w-full text-slate-400 text-[9px] font-bold uppercase mt-2">Cancelar</button>
            </form>
        </div>
    </div>

    <script>
        const SB_URL = "https://xegikxovbjttailnassr.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlZ2lreG92Ymp0dGFpbG5hc3NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MDA1OTMsImV4cCI6MjA5MzM3NjU5M30.tufFxLYUJ8wdDsFtWW4wL7Z1w3TMeUw3CRbNkHSp58w";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let cacheGastos = [];
        let estadoOrden = { columna: 'mes', direccion: 'desc' };
        let miGrafico = null;

        const mesesMapa = { 'enero': 1, 'febrero': 2, 'marzo': 3, 'abril': 4, 'mayo': 5, 'junio': 6, 'julio': 7, 'agosto': 8, 'septiembre': 9, 'octubre': 10, 'noviembre': 11, 'diciembre': 12 };
        const colores = { 'ALQUILER': '#fee2e2', 'LUZ': '#fef3c7', 'AGUA': '#e0f2fe', 'AGENCIA': '#f0fdf4', 'MATERIAL': '#f5f3ff', 'OTROS': '#f1f5f9' };
        const textoColores = { 'ALQUILER': '#991b1b', 'LUZ': '#92400e', 'AGUA': '#075985', 'AGENCIA': '#166534', 'MATERIAL': '#5b21b6', 'OTROS': '#475569' };

        function getValCron(t) {
            if(!t) return 0;
            const p = t.trim().toLowerCase().split(/\s+/);
            return p.length < 2 ? 0 : (parseInt(p[1]) * 100) + (mesesMapa[p[0]] || 0);
        }

        async function cargarGastos() {
            const { data, error } = await supabaseClient.from('gastos').select('*');
            if (!error) { 
                cacheGastos = data; 
                actualizarSelectorMesesFiltro();
                ejecutarOrden('mes', true); 
            }
        }

        function actualizarSelectorMesesFiltro() {
            const selector = document.getElementById('filtro-mes');
            const mesesUnicos = [...new Set(cacheGastos.map(g => g.mes))].sort((a, b) => getValCron(a) - getValCron(b));
            let html = '<option value="TODOS">Todos los meses</option>';
            mesesUnicos.forEach(m => html += `<option value="${m}">${m.toUpperCase()}</option>`);
            selector.innerHTML = html;
        }

        function renderizarTodo() {
            const buscar = document.getElementById('buscar-text').value.toLowerCase();
            const cat = document.getElementById('filtro-categoria').value;
            const mesSel = document.getElementById('filtro-mes').value;
            
            const filtrados = cacheGastos.filter(g => {
                const cumpleBusqueda = (g.concepto + g.mes + (g.obs || "")).toLowerCase().includes(buscar);
                const cumpleCat = (cat === 'TODAS' || g.concepto === cat);
                const cumpleMes = (mesSel === 'TODOS' || g.mes === mesSel);
                return cumpleBusqueda && cumpleCat && cumpleMes;
            });

            document.getElementById('tabla-gastos-body').innerHTML = filtrados.map(g => `
                <tr class="hover:bg-slate-50 border-b border-slate-50">
                    <td class="px-6 py-4 font-extrabold text-slate-400 uppercase text-[10px]">${g.mes}</td>
                    <td class="px-6 py-4"><span class="concepto-tag" style="background:${colores[g.concepto]}; color:${textoColores[g.concepto]}">${g.concepto}</span></td>
                    <td class="px-6 py-4 text-xs text-slate-500 italic">${g.obs || '-'}</td>
                    <td class="px-6 py-4 font-black text-slate-900">${Number(g.importe).toFixed(2)}€</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase ${g.estado === 'Pagado' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                            ${g.estado}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center space-x-3">
                        <button onclick="editarGasto('${g.id}')" class="text-slate-400 hover:text-slate-900 transition-colors">✎</button>
                        <button onclick="eliminarGasto('${g.id}')" class="text-slate-300 hover:text-rose-600 transition-colors">✕</button>
                    </td>
                </tr>
            `).join('');

            actualizarDashboardYGrafico(filtrados);
        }

        function actualizarDashboardYGrafico(datos) {
            const totalPagado = datos.filter(g => g.estado === 'Pagado').reduce((acc, g) => acc + Number(g.importe), 0);
            const totalPendiente = datos.filter(g => g.estado !== 'Pagado').reduce((acc, g) => acc + Number(g.importe), 0);

            document.getElementById('dashboard-mini').innerHTML = `
                <div class="card-dash border-l-4 border-emerald-500">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Total Pagado</p>
                    <p class="text-2xl font-black text-slate-900">${totalPagado.toFixed(2)}€</p>
                </div>
                <div class="card-dash border-l-4 border-rose-500">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Total Pendiente</p>
                    <p class="text-2xl font-black text-slate-900">${totalPendiente.toFixed(2)}€</p>
                </div>
            `;

            const acumulado = {};
            datos.forEach(g => { acumulado[g.mes] = (acumulado[g.mes] || 0) + Number(g.importe); });
            const etiquetas = Object.keys(acumulado).sort((a, b) => getValCron(a) - getValCron(b));
            
            if (miGrafico) miGrafico.destroy();
            miGrafico = new Chart(document.getElementById('chartGastos'), {
                type: 'bar',
                data: {
                    labels: etiquetas,
                    datasets: [{ label: 'Gasto (€)', data: etiquetas.map(e => acumulado[e]), backgroundColor: '#f43f5e', borderRadius: 8 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function ejecutarOrden(col, init = false) {
            if(!init) {
                estadoOrden.direccion = (estadoOrden.columna === col && estadoOrden.direccion === 'asc') ? 'desc' : 'asc';
                estadoOrden.columna = col;
            }
            cacheGastos.sort((a, b) => {
                let vA = col === 'mes' ? getValCron(a.mes) : parseFloat(a.importe);
                let vB = col === 'mes' ? getValCron(b.mes) : parseFloat(b.importe);
                return estadoOrden.direccion === 'asc' ? vA - vB : vB - vA;
            });
            renderizarTodo();
        }

        function generarSelectorMeses() {
            const mNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            let h = ""; [2025, 2026].forEach(a => mNames.forEach(m => h += `<option value="${m} ${a}">${m} ${a}</option>`));
            document.getElementById('g-mes').innerHTML = h;
            document.getElementById('g-mes').value = mNames[new Date().getMonth()] + " " + new Date().getFullYear();
        }

        function abrirModalGasto() { 
            document.getElementById('modal-titulo').innerText = "Registrar Nuevo Gasto";
            document.getElementById('g-id').value = "";
            document.getElementById('modalGasto').classList.remove('hidden'); 
        }

        function cerrarModalGasto() { 
            document.getElementById('modalGasto').classList.add('hidden');
            document.getElementById('formGasto').reset();
            generarSelectorMeses();
        }

        function editarGasto(id) {
            const g = cacheGastos.find(item => item.id == id);
            if (!g) return;
            document.getElementById('g-id').value = g.id;
            document.getElementById('g-mes').value = g.mes;
            document.getElementById('g-factura').value = g.factura || "";
            document.getElementById('g-concepto').value = g.concepto;
            document.getElementById('g-obs').value = g.obs || "";
            document.getElementById('g-importe').value = g.importe;
            document.getElementById('g-estado').value = g.estado;
            document.getElementById('modal-titulo').innerText = "Editar Gasto";
            document.getElementById('modalGasto').classList.remove('hidden');
        }

        document.getElementById('formGasto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('g-id').value;
            const data = { 
                mes: document.getElementById('g-mes').value, 
                factura: document.getElementById('g-factura').value, 
                concepto: document.getElementById('g-concepto').value, 
                obs: document.getElementById('g-obs').value,
                importe: parseFloat(document.getElementById('g-importe').value), 
                estado: document.getElementById('g-estado').value 
            };
            const { error } = id ? await supabaseClient.from('gastos').update(data).eq('id', id) : await supabaseClient.from('gastos').insert([data]);
            if(error) alert(error.message); else { cerrarModalGasto(); cargarGastos(); }
        });

        async function eliminarGasto(id) { if(confirm('¿Eliminar?')) { await supabaseClient.from('gastos').delete().eq('id', id); cargarGastos(); } }

        window.onload = () => { generarSelectorMeses(); cargarGastos(); };
    </script>
</body>
</html>
